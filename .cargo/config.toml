# Cargo workspace configuration

# Cross-compile para Windows x86_64 desde Linux (requiere mingw-w64).
# Las flags -static-libgcc y -static-libstdc++ evitan que la DLL dependa
# de libgcc_s_seh-1.dll / libwinpthread-1.dll en el PC del jugador.
[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"
rustflags = [
    "-C", "link-arg=-static-libgcc",
    "-C", "link-arg=-static-libstdc++",
]
