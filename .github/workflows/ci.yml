name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Format + Clippy + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable + componentes)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: check

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: |
          cargo clippy \
            --workspace \
            --all-targets \
            -- \
            -D warnings \
            -W clippy::pedantic \
            -A clippy::must_use_candidate \
            -A clippy::missing_errors_doc \
            -A clippy::missing_panics_doc

      - name: Tests unitarios
        run: cargo test --workspace

      - name: cargo doc
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  build-plugin-linux:
    name: Build plugin (.so Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-linux

      - name: Compilar plugin (release)
        run: cargo build --release -p rmtfar-plugin

      - name: Verificar que el .so existe y exporta los símbolos de Mumble
        run: |
          SO=target/release/librmtfar_plugin.so
          echo "=== Tamaño ==="
          ls -lh "$SO"
          echo "=== Símbolos exportados de Mumble ==="
          nm -D "$SO" | grep -E 'mumble_' | head -20

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmtfar-plugin-linux-x64
          path: target/release/librmtfar_plugin.so
          retention-days: 7

  build-plugin-windows:
    name: Build plugin (.dll Windows x64)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable + Windows target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Ensure Windows target on active toolchain
        run: |
          rustup show active-toolchain
          rustup target add x86_64-pc-windows-gnu

      - name: Install mingw-w64
        run: sudo apt-get install -y mingw-w64

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-windows-gnu
          key: plugin

      - name: Compilar plugin (release)
        run: cargo build --release -p rmtfar-plugin --target x86_64-pc-windows-gnu

      - name: Verificar exports Mumble en la DLL
        run: |
          DLL=target/x86_64-pc-windows-gnu/release/rmtfar_plugin.dll
          echo "=== Tamaño ==="
          ls -lh "$DLL"
          echo "=== Exports Mumble ==="
          x86_64-w64-mingw32-objdump -p "$DLL" | grep -E "mumble_"
          x86_64-w64-mingw32-objdump -p "$DLL" | grep -q "mumble_init"
          x86_64-w64-mingw32-objdump -p "$DLL" | grep -q "mumble_onAudioSourceFetched"
          x86_64-w64-mingw32-objdump -p "$DLL" | grep -q "mumble_getFeatures"
          echo "=== Todos los exports requeridos presentes ==="

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmtfar-plugin-windows-x64
          path: target/x86_64-pc-windows-gnu/release/rmtfar_plugin.dll
          retention-days: 30

  build-extension-windows:
    name: Build extension DLL (Windows x64)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable + Windows target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Ensure Windows target on active toolchain
        run: |
          rustup show active-toolchain
          rustup target add x86_64-pc-windows-gnu

      - name: Install mingw-w64
        run: sudo apt-get install -y mingw-w64

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-windows-gnu
          key: extension

      - name: Compilar extension DLL (release)
        run: cargo build --release -p rmtfar-extension --target x86_64-pc-windows-gnu

      - name: Verificar exports PE (RVExtension*)
        run: |
          DLL=target/x86_64-pc-windows-gnu/release/rmtfar.dll
          echo "=== Tamaño ==="
          ls -lh "$DLL"
          echo "=== Export table PE ==="
          x86_64-w64-mingw32-objdump -p "$DLL" | grep -A 20 "Ordinal/Name Pointer"
          x86_64-w64-mingw32-objdump -p "$DLL" | grep -q "RVExtension$"
          x86_64-w64-mingw32-objdump -p "$DLL" | grep -q "RVExtensionArgs"
          x86_64-w64-mingw32-objdump -p "$DLL" | grep -q "RVExtensionVersion"
          echo "=== Todos los exports requeridos presentes ==="

      - name: Renombrar a rmtfar_x64.dll
        run: cp target/x86_64-pc-windows-gnu/release/rmtfar.dll rmtfar_x64.dll

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmtfar-extension-windows-x64
          path: rmtfar_x64.dll
          retention-days: 30

  coverage:
    name: Code coverage (tarpaulin)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage

      - name: Cache cargo-tarpaulin binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tarpaulin
          key: tarpaulin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: tarpaulin-${{ runner.os }}-

      - name: Install cargo-tarpaulin (if not cached)
        run: command -v cargo-tarpaulin || cargo install cargo-tarpaulin --locked

      - name: Run coverage
        # Exclude cdylib crates (rmtfar-extension, rmtfar-plugin) — tarpaulin
        # can't instrument cdylib targets reliably. We still cover the shared
        # protocol crate, bridge, and test-client.
        run: |
          cargo tarpaulin \
            --workspace \
            --exclude rmtfar-extension \
            --exclude rmtfar-plugin \
            --timeout 120 \
            --out Xml \
            --output-dir coverage/

      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/cobertura.xml
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/cobertura.xml
          fail_ci_if_error: false
