name: Release

# Triggered when a version tag is pushed (e.g. v0.2.0).
# Builds Arma-3-compatible Windows DLLs with cargo-xwin (MSVC CRT),
# the Linux plugin .so, and publishes a GitHub Release.
on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Windows DLLs (MSVC via cargo-xwin) ────────────────────────────────────
  build-windows:
    name: Build Windows DLLs (MSVC)
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable + MSVC target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-release-msvc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-msvc-

      - name: Install cargo-xwin
        run: cargo install cargo-xwin --locked

      - name: Build extension DLL (Arma 3)
        run: cargo xwin build --release -p rmtfar-extension --target x86_64-pc-windows-msvc

      - name: Build plugin DLL (Mumble)
        run: cargo xwin build --release -p rmtfar-plugin --target x86_64-pc-windows-msvc

      - name: Rename extension → rmtfar_x64.dll
        run: |
          cp target/x86_64-pc-windows-msvc/release/rmtfar.dll rmtfar_x64.dll

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmtfar-extension-windows-msvc
          path: rmtfar_x64.dll

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmtfar-plugin-windows-msvc
          path: target/x86_64-pc-windows-msvc/release/rmtfar_plugin.dll

  # ── Linux plugin .so ───────────────────────────────────────────────────────
  build-linux:
    name: Build Linux plugin (.so)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-release-linux-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-linux-

      - name: Build plugin (.so)
        run: cargo build --release -p rmtfar-plugin

      - name: Build bridge + test-client
        run: cargo build --release -p rmtfar-bridge -p rmtfar-test-client

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmtfar-plugin-linux-x64
          path: target/release/librmtfar_plugin.so

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmtfar-bridge-linux-x64
          path: |
            target/release/rmtfar-bridge
            target/release/rmtfar-test-client

  # ── GitHub Release ─────────────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Show artifact tree
        run: find release-artifacts/ -type f | sort

      - name: Package @rmtfar mod folder
        run: |
          TAG="${{ github.ref_name }}"
          MOD_DIR="rmtfar-${TAG}-windows"
          mkdir -p "${MOD_DIR}/@rmtfar/addons"

          # DLLs (MSVC)
          cp release-artifacts/rmtfar-extension-windows-msvc/rmtfar_x64.dll \
             "${MOD_DIR}/@rmtfar/"
          cp release-artifacts/rmtfar-plugin-windows-msvc/rmtfar_plugin.dll \
             "${MOD_DIR}/@rmtfar/"

          # SQF sources (PBO is not built in CI yet; include sources for manual packing)
          cp -r arma-mod/@rmtfar/addons/rmtfar "${MOD_DIR}/@rmtfar/addons/"

          cp LICENSE README.md "${MOD_DIR}/"
          zip -r "${MOD_DIR}.zip" "${MOD_DIR}/"
          echo "MOD_ZIP=${MOD_DIR}.zip" >> "$GITHUB_ENV"

      - name: Package Linux binaries
        run: |
          TAG="${{ github.ref_name }}"
          LINUX_DIR="rmtfar-${TAG}-linux"
          mkdir -p "${LINUX_DIR}"

          cp release-artifacts/rmtfar-plugin-linux-x64/librmtfar_plugin.so \
             "${LINUX_DIR}/"
          cp release-artifacts/rmtfar-bridge-linux-x64/rmtfar-bridge \
             release-artifacts/rmtfar-bridge-linux-x64/rmtfar-test-client \
             "${LINUX_DIR}/"
          cp LICENSE README.md "${LINUX_DIR}/"

          tar -czf "${LINUX_DIR}.tar.gz" "${LINUX_DIR}/"
          echo "LINUX_TAR=${LINUX_DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.MOD_ZIP }}
            ${{ env.LINUX_TAR }}
            release-artifacts/rmtfar-extension-windows-msvc/rmtfar_x64.dll
            release-artifacts/rmtfar-plugin-windows-msvc/rmtfar_plugin.dll
            release-artifacts/rmtfar-plugin-linux-x64/librmtfar_plugin.so
