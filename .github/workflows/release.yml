name: Release

# Triggered when a version tag is pushed (e.g. v0.2.0).
# Builds Windows DLLs with mingw-w64 (same toolchain as CI checks)
# and the Linux plugin .so, then publishes a GitHub Release.
on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Windows DLLs (mingw-w64) ───────────────────────────────────────────────
  build-windows:
    name: Build Windows DLLs (mingw-w64)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable + Windows GNU target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Ensure Windows target on active toolchain
        run: |
          rustup show active-toolchain
          rustup target add x86_64-pc-windows-gnu

      - name: Install mingw-w64
        run: sudo apt-get install -y mingw-w64

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-windows-gnu

      - name: Build extension DLL (Arma 3)
        run: cargo build --release -p rmtfar-extension --target x86_64-pc-windows-gnu

      - name: Build plugin DLL (Mumble)
        run: cargo build --release -p rmtfar-plugin --target x86_64-pc-windows-gnu

      - name: Rename extension → rmtfar_x64.dll
        run: cp target/x86_64-pc-windows-gnu/release/rmtfar.dll rmtfar_x64.dll

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmtfar-extension-windows
          path: rmtfar_x64.dll

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmtfar-plugin-windows
          path: target/x86_64-pc-windows-gnu/release/rmtfar_plugin.dll

  # ── Linux plugin .so ───────────────────────────────────────────────────────
  build-linux:
    name: Build Linux plugin (.so)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-linux

      - name: Build plugin (.so)
        run: cargo build --release -p rmtfar-plugin

      - name: Build bridge + test-client
        run: cargo build --release -p rmtfar-bridge -p rmtfar-test-client

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmtfar-plugin-linux-x64
          path: target/release/librmtfar_plugin.so

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmtfar-bridge-linux-x64
          path: |
            target/release/rmtfar-bridge
            target/release/rmtfar-test-client

  # ── GitHub Release ─────────────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Show artifact tree
        run: find release-artifacts/ -type f | sort

      - name: Generate CHANGELOG with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --tag ${{ github.ref_name }}
        env:
          OUTPUT: CHANGELOG.md

      - name: Install armake2 (PBO)
        run: cargo install armake2

      - name: Package @rmtfar mod folder
        run: |
          TAG="${{ github.ref_name }}"
          MOD_DIR="rmtfar-${TAG}-windows"
          mkdir -p "${MOD_DIR}/@rmtfar/addons"

          cp release-artifacts/rmtfar-extension-windows/rmtfar_x64.dll \
             "${MOD_DIR}/@rmtfar/"
          cp release-artifacts/rmtfar-plugin-windows/rmtfar_plugin.dll \
             "${MOD_DIR}/@rmtfar/"
          cp mod.cpp "${MOD_DIR}/@rmtfar/"
          armake2 pack addon "${MOD_DIR}/@rmtfar/addons/rmtfar.pbo"

          cp LICENSE README.md "${MOD_DIR}/"
          zip -r "${MOD_DIR}.zip" "${MOD_DIR}/"
          echo "MOD_ZIP=${MOD_DIR}.zip" >> "$GITHUB_ENV"

      - name: Package Linux binaries
        run: |
          TAG="${{ github.ref_name }}"
          LINUX_DIR="rmtfar-${TAG}-linux"
          mkdir -p "${LINUX_DIR}"

          cp release-artifacts/rmtfar-plugin-linux-x64/librmtfar_plugin.so \
             "${LINUX_DIR}/"
          cp release-artifacts/rmtfar-bridge-linux-x64/rmtfar-bridge \
             release-artifacts/rmtfar-bridge-linux-x64/rmtfar-test-client \
             "${LINUX_DIR}/"
          cp LICENSE README.md "${LINUX_DIR}/"

          tar -czf "${LINUX_DIR}.tar.gz" "${LINUX_DIR}/"
          echo "LINUX_TAR=${LINUX_DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            ${{ env.MOD_ZIP }}
            ${{ env.LINUX_TAR }}
            release-artifacts/rmtfar-extension-windows/rmtfar_x64.dll
            release-artifacts/rmtfar-plugin-windows/rmtfar_plugin.dll
            release-artifacts/rmtfar-plugin-linux-x64/librmtfar_plugin.so
            CHANGELOG.md
